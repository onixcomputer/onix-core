[package]
name = "agentkit"
version = "0.1.0"
edition = "2024"
description = "Universal AI agent instruction format and management tool"
license = "MIT"
authors = ["Britton Robinette"]
repository = "https://github.com/brittonr/onix-core"
keywords = ["ai", "agent", "claude", "openai", "cursor"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
# CLI
clap = { version = "4", features = ["derive", "env"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1"
toml = "0.8"

# File operations
walkdir = "2"
glob = "0.3"

# Error handling
thiserror = "2"
anyhow = "1"

# Path handling
directories = "6"
dirs = "6"

# Markdown parsing
pulldown-cmark = "0.12"
pulldown-cmark-to-cmark = "18"

# Terminal output
colored = "3"

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

[[bin]]
name = "agentkit"
path = "src/main.rs"
